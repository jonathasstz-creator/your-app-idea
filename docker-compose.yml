version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: piano_trainer_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: piano_trainer
    ports:
      - "5432:5432"
    volumes:
      - piano_trainer_db:/var/lib/postgresql/data

volumes:
  piano_trainer_db:
